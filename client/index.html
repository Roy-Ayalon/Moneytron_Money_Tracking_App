        </div>
      <div className="panel">
        <table>
          <thead><tr>
            <th className="nosort">✖</th>
            {hdr('Tag','tag','w-tag')}
            <th className="w-date" onClick={()=>setSort('date')}>Date<br/><span style={{fontSize:'11px',fontWeight:600}}>(DD-MM-YYYY)</span>{sortKey==='date'?(sortDir==='asc'?' ↑':' ↓'):' ↑↓'}</th>
            {hdr('Name','name','w-name')}
            {hdr('Transaction Amount','amount','w-amt')}
            {hdr('Debit Amount (ILS)','debit','w-debit')}
            {hdr('Type','type')}
            {hdr('Category','category','w-cat')}
            {hdr('Sub-category','subcategory','w-sub')}
            {hdr('Notes','notes','w-notes')}
            {hdr('Vi','vi')}
          </tr></thead>
          <tbody>
            {view.length? view.map((r,i)=>{
              const id=r.id||('p_'+i+'_'+(r.tag||'')+'_'+(r.date||'')+'_'+(r.name||'')); const currency=r.currency||'ILS';
              return (
                <tr key={id} className={r.vi?'row-vi':''}>
                  <td style={{width:48}}><button className="btn danger" onClick={()=>delRow(id)}>✖</button></td>
                  <td className="w-tag">
                    <input 
                      type="text" 
                      value={r.tag_edit != null ? r.tag_edit : (String(r.tag||'').includes('/') ? r.tag : ((r.month_tag!=null ? r.month_tag : (r.tag!=null ? r.tag : '')) + '/' + String(r.year||'').slice(-2)))} 
                      onChange={(e)=>{
                        // Only allow digits and /
                        const v = e.target.value.replace(/[^0-9\/]/g, '');
                        patch(id,{tag_edit: v});
                      }}
                      onBlur={(e)=>{
                        const val = (r.tag_edit != null ? r.tag_edit : '').trim();
                        const tagMatch = val.match(/^0*(\d{1,2})\/(\d{2})$/);
                        if(tagMatch){
                          const mm=Number(tagMatch[1]), yy=Number(tagMatch[2])+2000;
                          if(mm>=1 && mm<=12){
                            const normalized = mm + '/' + tagMatch[2];
                            patch(id,{tag:normalized, month_tag:mm, year:yy, tag_edit:undefined, _tag_manual:true});
                          } else {
                            patch(id,{tag_edit:undefined});
                          }
                        } else {
                          patch(id,{tag_edit:undefined});
                        }
                      }}
                      placeholder="e.g. 2/26"
                      title="Month/Year (M/YY e.g. 2/26)"
                      style={{width:70,textAlign:'center'}}
                    />
                  </td>
                  <td className="w-date">
                    <input 
                      type="text" 
                      placeholder="DD-MM-YYYY"
                      value={r.date_str || formatDMY(r.date_iso || r.date)} 
                      onChange={(e)=>{
                        // Only allow digits and dashes
                        const dmyValue = e.target.value.replace(/[^0-9\-]/g, '');
                        const isoValue = parseDMYtoISO(dmyValue);
                        const d = dayjs(isoValue);
                        const newMonth = d.isValid() ? d.month() + 1 : (r.month_tag || Number(String(r.tag||'').split('/')[0]) || 1);
                        const newYear = d.isValid() ? d.year() : (r.year || dayjs().year());
                        const updates = {
                          date: isoValue,
                          date_iso: isoValue,
                          date_str: dmyValue,
                          year: newYear,
                          month_tag: newMonth
                        };
                        // Only auto-update tag if user hasn't manually set it
                        if(!r._tag_manual){
                          updates.tag = newMonth + '/' + String(newYear).slice(-2);
                        }
                        patch(id, updates);
                      }}
                      onBlur={(e)=>{
                        // Validate DD-MM-YYYY format on blur
                        const val = (r.date_str || '').trim();
                        if(val && !/^\d{2}-\d{2}-\d{4}$/.test(val)){
                          const d = dayjs(parseDMYtoISO(val));
                          if(d.isValid()){
                            patch(id, {date_str: d.format('DD-MM-YYYY'), date: d.format('YYYY-MM-DD'), date_iso: d.format('YYYY-MM-DD')});
                          }
                        }
                      }}
                    />
                  </td>
                  <td className="w-name" style={{textAlign:'center'}}>
                    <div className="cell-hscroll"><input className="fit" type="text" value={r.name||''} title={r.name||''} onChange={(e)=>patch(id,{name:e.target.value})}/></div>
                  </td>
                  <td className="w-amt">
                    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                      {/* Use same currency symbol logic as TransactionsTab */}
                      {(() => {
                        const currencySymbols = { ILS: '₪', USD: '$', EUR: '€', GBP: '£' };
                        return <button className="currency-toggle" onClick={()=>toggleCurrency(id)}>{currencySymbols[currency] || currency}</button>;
                      })()}
                      <input
                        className="num-input"
                        type="text"
                        value={(r.amount_edit != null ? r.amount_edit : String(fmt2(r.amount)))}
                        onChange={(e)=>onAmountEditChange(id, e.target.value)}
                        onBlur={()=>onAmountEditBlur(id)}
                      />
                    </div>
                  </td>
                  <td className="w-debit">
                    <input
                      className="num-input"
                      type="text"
                      value={(r.debit_edit != null ? r.debit_edit : String(fmt2(r.debit)))}
                      onChange={(e)=>onDebitEditChange(id, e.target.value)}
                      onBlur={()=>onDebitEditBlur(id)}
                    />
                  </td>
                  <td><button className={'type-pill '+(r.type==='Expense'?'type-exp':'type-inc')} onClick={()=>toggleType(id)}>{r.type||'Expense'}</button></td>
                  <td className="w-cat"><select value={r.category||''} onChange={(e)=>patch(id,{category:e.target.value, subcategory:''})}><option value="">— Select —</option>{Object.keys(categories||{}).sort((a,b)=>a.localeCompare(b)).map(c=><option key={c} value={c}>{c}</option>)}</select></td>
                  <td className="w-sub"><select value={r.subcategory||''} onChange={(e)=>patch(id,{subcategory:e.target.value})}><option value="">— Select —</option>{((categories||{})[r.category]||[]).slice().sort((a,b)=>a.localeCompare(b)).map(s=><option key={s} value={s}>{s}</option>)}</select></td>
                  <td className="w-notes" style={{textAlign:'left'}}><input type="text" value={r.notes||''} onChange={(e)=>patch(id,{notes:e.target.value})}/></td>
                  <td><input type="checkbox" checked={!!r.vi} onChange={(e)=>patch(id,{vi:e.target.checked})}/></td>
                </tr>
              );
            }) : <tr><td colSpan="11" style={{textAlign:'center',color:'#6b7280'}}>No saved data yet.</td></tr>}
            {view.length > 0 && <tr style={{borderTop:'3px solid #6b46c1',backgroundColor:'#f5f3ff'}}><td></td><td></td><td></td><td style={{fontWeight:800,textAlign:'center',color:'#2c2761'}}>{view.length} rows</td><td></td><td style={{fontWeight:800,textAlign:'center',color:'#2c2761'}}>₪{fmt2(view.reduce((a,r)=>a+Number(r.debit||0),0))}</td><td></td><td></td><td></td><td></td><td></td></tr>}
          </tbody>
        </table>
      </div>
    </React.Fragment>
  );
}

/* ---------- Summary (charts etc.) ---------- */
function SummaryTab({past,active,onNavigateToData}){
  const [err,setErr]=React.useState(''); const [selectedMonth,setSelectedMonth]=React.useState(''); const [subPieCat,setSubPieCat]=React.useState(''); const [expanded,setExpanded]=React.useState({});
  const [monthRangeStart, setMonthRangeStart] = React.useState(-1); // Starting index for 6-month range (-1 = not initialized yet)
  const mRef=React.useRef(null), nRef=React.useRef(null), catRef=React.useRef(null), subRef=React.useRef(null);
  const mChart=React.useRef(null), nChart=React.useRef(null), catPie=React.useRef(null), subPie=React.useRef(null);
  // Fetch aggregation from server instead of computing client-side
  const [agg, setAgg] = React.useState({months: [], mcdAll: {}, monthNet: {}, outTotals: []});
  React.useEffect(()=>{
    API.getSummary().then(data => {
      setAgg({
        months: data.months || [],
        mcdAll: data.mcdAll || {},
        monthNet: data.monthNet || {},
        outTotals: data.outTotals || [],
      });
    }).catch(e => setErr('Failed to load summary: ' + e.message));
  }, [past]);
  const months=agg.months, monthCategoryDataAll=agg.mcdAll, monthNet=agg.monthNet, outTotals=agg.outTotals;
  
  // Calculate visible months (last 6 or all if fewer than 6)
  const maxDisplayMonths = 6;
  const totalMonths = months.length;
  const displayMonths = React.useMemo(() => {
    if (totalMonths <= maxDisplayMonths) {
      return months; // Show all months if 6 or fewer
    }
    
    // Calculate the slice based on monthRangeStart (-1 means not initialized yet, default to last 6)
    const effectiveStart = monthRangeStart < 0 ? Math.max(0, totalMonths - maxDisplayMonths) : monthRangeStart;
    const startIdx = Math.max(0, Math.min(effectiveStart, totalMonths - maxDisplayMonths));
    return months.slice(startIdx, startIdx + maxDisplayMonths);
  }, [months, monthRangeStart, totalMonths]);
  
  // Initialize to show most recent months by default (on first load or when totalMonths increases)
  const prevTotalMonthsRef = React.useRef(totalMonths);
  const hasInitialized = React.useRef(false);
  React.useEffect(() => {
    const prevTotal = prevTotalMonthsRef.current;
    
    // Initialize on first load to show last 6 months
    if (!hasInitialized.current && totalMonths > 0) {
      hasInitialized.current = true;
      if (totalMonths > maxDisplayMonths) {
        setMonthRangeStart(totalMonths - maxDisplayMonths);
      } else {
        setMonthRangeStart(0);
      }
    }
    // Or update when new months are added (but not when user navigates)
    else if (totalMonths > maxDisplayMonths && totalMonths > prevTotal) {
      setMonthRangeStart(totalMonths - maxDisplayMonths);
    }
    
    prevTotalMonthsRef.current = totalMonths;
  }, [totalMonths]);
  
  const canNavigatePrev = true; // Always allow (wraps around)
  const canNavigateNext = true; // Always allow (wraps around)
  
  // Handle Previous button - slide back one month, wrap only at the beginning
  function handlePrevious() {
    const newStart = monthRangeStart - 1;
    if (newStart < 0) {
      // Wrap to the end (last possible window)
      setMonthRangeStart(Math.max(0, totalMonths - maxDisplayMonths));
    } else {
      // Normal slide back
      setMonthRangeStart(newStart);
    }
  }
  
  // Handle Next button - slide forward one month, wrap only at the end
  function handleNext() {
    const newStart = monthRangeStart + 1;
    const maxStart = Math.max(0, totalMonths - maxDisplayMonths);
    if (newStart > maxStart) {
      // Wrap to the beginning
      setMonthRangeStart(0);
    } else {
      // Normal slide forward
      setMonthRangeStart(newStart);
    }
  }
  React.useEffect(()=>{ try{ if(!months.length){ setSelectedMonth(''); setSubPieCat(''); return; } var def=selectedMonth&&months.includes(selectedMonth)?selectedMonth:months[months.length-1]; setSelectedMonth(def); var cats=Object.keys(monthCategoryDataAll[def]||{}); setSubPieCat(prev=> (prev && cats.includes(prev))?prev:(cats[0]||'')); }catch(e){ setErr('Init error: '+e.message);} },[months.join(','), JSON.stringify(monthCategoryDataAll)]);
  React.useEffect(()=>{ try{
    if(!active) return;
    [mChart,nChart,catPie,subPie].forEach(R=>{ if(R.current && typeof R.current.destroy==='function'){ try{R.current.destroy();}catch(_){ } R.current=null; }});
    if(!months.length) return;
    var ChartLib=window.Chart, DLabels=window.ChartDataLabels; if(DLabels && !window.__mtDLReg){ ChartLib.register(DLabels); window.__mtDLReg=true; }
    const common={responsive:true, maintainAspectRatio:false};
    const chartMaxMonths = 12;
    const chartMonths = months.length > chartMaxMonths ? months.slice(-chartMaxMonths) : months;
    const chartOutTotals = months.length > chartMaxMonths ? outTotals.slice(-chartMaxMonths) : outTotals;
    if(mRef.current){
      const ctx=mRef.current.getContext('2d');
      mChart.current=new ChartLib(ctx,{
        type:'bar',
        data:{labels:chartMonths,datasets:[{label:'Monthly Outcome (₪)',data:chartOutTotals}]},
        options:Object.assign({},common,{
          plugins:{
            legend:{display:false},
            datalabels:DLabels?{
              formatter:(v)=>Math.round(v).toLocaleString(),
              anchor:'end',align:'top',clamp:true
            }:{}
          },
          scales:{y:{beginAtZero:true}}
        })
      });
    }
    if(nRef.current){
      const ctx=nRef.current.getContext('2d');
      const nvals=chartMonths.map(m=>(monthNet[m]&&monthNet[m].net)||0);
      nChart.current=new ChartLib(ctx,{
        type:'bar',
        data:{labels:chartMonths,datasets:[{label:'Net (₪)',data:nvals}]},
        options:Object.assign({},common,{
          plugins:{
            legend:{display:false},
            datalabels:DLabels?{
              formatter:(v)=>Math.round(v).toLocaleString(),
              anchor:'end',align:'top',clamp:true
            }:{}
          }
        })
      });
    }
    const piePlugins={legend:{position:'right'}, datalabels:{display:false}};
    // Custom tooltip with percentage on new line
    function pieTooltipCallback(context) {
      const label = context.label || '';
      const value = context.parsed || 0;
      const dataArr = context.chart.data.datasets[0].data;
      const total = dataArr.reduce((a,b)=>a+b,0);
      const percent = total ? (value/total*100) : 0;
      return [label + ': ' + fmt2(value), fmt2(percent) + '%'];
    }
    const pieOptionsWithPct = Object.assign({}, common, {
      plugins: Object.assign({}, piePlugins, {
        tooltip: {
          callbacks: {
            label: pieTooltipCallback
          }
        }
      })
    });
    if(selectedMonth && catRef.current){
      const ctx=catRef.current.getContext('2d');
      const mcd=monthCategoryDataAll[selectedMonth]||{};
      // Only outcome (expense) categories
      const labels=Object.keys(mcd).filter(k=>(mcd[k].type||'Expense')==='Expense');
      const data=labels.map(k=>mcd[k].total);
      catPie.current=new ChartLib(ctx,{
        type:'pie',
        data:{labels,datasets:[{data}]},
        options: pieOptionsWithPct
      });
    }
    if(selectedMonth && subPieCat && subRef.current){
      const ctx=subRef.current.getContext('2d');
      const mcd=monthCategoryDataAll[selectedMonth]||{};
      // Only show subcategories if parent is outcome (expense)
      if (mcd[subPieCat] && (mcd[subPieCat].type||'Expense')==='Expense') {
        const subs=(mcd[subPieCat]&&mcd[subPieCat].subcategories)||{};
        const labels=Object.keys(subs);
        const data=labels.map(k=>{
          const subData = subs[k];
          return typeof subData === 'number' ? subData : subData.total;
        });
        subPie.current=new ChartLib(ctx,{
          type:'pie',
          data:{labels,datasets:[{data}]},
          options: pieOptionsWithPct
        });
      } else {
        // If not expense, show empty pie
        subPie.current=new ChartLib(ctx,{
          type:'pie',
          data:{labels:[],datasets:[{data:[]}]},
          options: pieOptionsWithPct
        });
      }
    }
  }catch(e){ setErr('Chart error: '+e.message); } },[active, months.join(','), selectedMonth, subPieCat, JSON.stringify(monthCategoryDataAll), JSON.stringify(monthNet)]);
  if(!(past||[]).length) return <div className="panel"><div>No data available. Upload data first.</div></div>;
  const monthCats=Object.keys(monthCategoryDataAll[selectedMonth]||{}).sort((a,b)=>a.localeCompare(b));
  React.useEffect(()=>{ if(!selectedMonth) return; if(!monthCats.length){ setSubPieCat(''); return; } if(!subPieCat || !monthCats.includes(subPieCat)) setSubPieCat(monthCats[0]); },[selectedMonth, monthCats.join(',')]);
  return (
    <div className="panel">
      {err && <div className="panel" style={{background:'#fff7ed',border:'1px solid #fcd19c',color:'#92400e'}}>⚠️ {err}</div>}
      <div className="section-title">📅 Comparison Across Months</div>
      {totalMonths > maxDisplayMonths && (
        <div className="controls" style={{marginBottom:10}}>
          <button 
            className="btn btn-xs" 
            onClick={handlePrevious}
          >
            ← Previous
          </button>
          <span className="muted" style={{margin: '0 12px'}}>
            Showing months {displayMonths[0]} to {displayMonths[displayMonths.length-1]} 
            ({displayMonths.length} of {totalMonths} total)
          </span>
          <button 
            className="btn btn-xs" 
            onClick={handleNext}
          >
            Next →
          </button>
          <button 
            className="btn btn-xs" 
            onClick={() => setMonthRangeStart(totalMonths - Math.min(maxDisplayMonths, totalMonths))}
            style={{marginLeft: 8}}
          >
            Latest
          </button>
        </div>
      )}
      <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>Category</th>{displayMonths.map(m=><th key={'h'+m}>{m}</th>)}</tr></thead>
          <tbody>
            {(function(){
              // Show all categories (income and expense) that have data in displayed months
              const allCats=(function(){ 
                var s={}; 
                displayMonths.forEach(mm=>{ 
                  if (monthCategoryDataAll[mm]) {
                    Object.keys(monthCategoryDataAll[mm]).forEach(c=>s[c]=1); 
                  }
                }); 
                return Object.keys(s).sort((a,b)=>a.localeCompare(b)); 
              })();
              if(!allCats.length) return <tr><td colSpan={displayMonths.length+1} className="muted" style={{textAlign:'center'}}>No categories yet.</td></tr>;
              return allCats.filter(cat => {
                // Hide category if it has no data (all zeros/dashes) across displayed months
                const hasData = displayMonths.some(m => {
                  const cell = monthCategoryDataAll[m] && monthCategoryDataAll[m][cat];
                  return cell && cell.total !== 0;
                });
                return hasData;
              }).map(cat=>{
                const exp=!!expanded[cat];
                return (
                  <React.Fragment key={cat}>
                    <tr>
                      <td
                        style={{cursor:'pointer'}}
                        title={'Double-click to filter Data tab by "'+cat+'"'}
                        onDoubleClick={()=>onNavigateToData && onNavigateToData({col:'category',val:cat})}
                      ><button className="btn btn-xs" onClick={()=>setExpanded(p=>Object.assign({},p,{[cat]:!p[cat]}))}>{exp?'▾':'▸'}</button> <strong>{cat}</strong></td>
                      {displayMonths.map(m=>{ 
                        const cell=monthCategoryDataAll[m]&&monthCategoryDataAll[m][cat]; 
                        const v=cell?cell.total:0; 
                        const isPositive = v > 0;
                        const displayValue = v !== 0 ? (isPositive ? '+' : '') + '₪' + fmt2(Math.abs(v)) : '—';
                        // Extract tag number from month label (e.g. "2025-03" -> "3" or "3" -> "3")
                        return <td key={cat+'_'+m}
                          style={{cursor:'pointer'}}
                          title={'Double-click to filter Data tab by "'+cat+'" in month '+m}
                          onDoubleClick={()=>onNavigateToData && onNavigateToData({col:'tag',val:m,col2:'category',val2:cat})}
                        ><strong style={{color: v > 0 ? '#16a34a' : v < 0 ? '#dc2626' : 'inherit'}}>{displayValue}</strong></td>; 
                      })}
                    </tr>
                    {exp && (function(){
                      var subsSet={}; displayMonths.forEach(m=>{ var cell=monthCategoryDataAll[m]&&monthCategoryDataAll[m][cat]; if(cell){ Object.keys(cell.subcategories||{}).forEach(s=>subsSet[s]=1); }});
                      var subs=Object.keys(subsSet).sort((a,b)=>a.localeCompare(b));
                      // Hide subcategories that have no data across displayed months
                      return subs.filter(s => {
                        const hasData = displayMonths.some(m => {
                          var cell=monthCategoryDataAll[m]&&monthCategoryDataAll[m][cat];
                          var subData=cell?(cell.subcategories[s]||{total:0}):0;
                          var v = typeof subData === 'number' ? subData : subData.total;
                          return v !== 0;
                        });
                        return hasData;
                      }).map(s=>(
                        <tr key={cat+'__'+s}>
                          <td className="muted" style={{paddingLeft:42,cursor:'pointer'}}
                            title={'Double-click to filter Data tab by category "'+cat+'" + subcategory "'+s+'"'}
                            onDoubleClick={()=>onNavigateToData && onNavigateToData({col:'category',val:cat,col2:'subcategory',val2:s})}
                          >↳ {s}</td>
                          {displayMonths.map(m=>{
                            var cell=monthCategoryDataAll[m]&&monthCategoryDataAll[m][cat];
                            var subData=cell?(cell.subcategories[s]||{total:0}):0;
                            var v = typeof subData === 'number' ? subData : subData.total;
                            const isPositive = v > 0;
                            const displayValue = v !== 0 ? (isPositive ? '+' : '') + '₪' + fmt2(Math.abs(v)) : '—';
                            return <td key={cat+'_'+s+'_'+m}
                              style={{color: v > 0 ? '#16a34a' : v < 0 ? '#dc2626' : 'inherit', cursor:'pointer'}}
                              title={'Double-click to filter Data tab by "'+s+'" in month '+m+' under "'+cat+'"'}
                              onDoubleClick={()=>onNavigateToData && onNavigateToData({col:'tag',val:m,col2:'category',val2:cat,col3:'subcategory',val3:s})}
                            >{displayValue}</td>;
                          })}
                        </tr>
                      ));
                    })()}
                  </React.Fragment>
                );
              });
            })()}
            <tr style={{
              borderTop: '4px double #6b46c1',
              borderBottom: '4px double #6b46c1',
              backgroundColor: '#fde047',
              boxShadow: '0 4px 12px rgba(234, 179, 8, 0.3)',
              transform: 'scale(1.01)'
            }}>
              <td style={{backgroundColor: '#fde047', padding: '14px'}}><strong style={{fontSize: '17px', fontWeight: '800', color: '#1f1b2e'}}>Net (Income − Expenses)</strong></td>
              {displayMonths.map(m=> {
                const netValue = Number((monthNet[m]&&monthNet[m].net)||0);
                const isPositive = netValue > 0;
                const displayValue = netValue !== 0 ? (isPositive ? '+' : '') + '₪' + fmt2(Math.abs(netValue)) : '₪0.00';
                return <td key={'net_'+m} style={{backgroundColor: '#fde047', padding: '14px'}}><strong style={{
                  fontSize: '16px',
                  fontWeight: '800',
                  color: netValue > 0 ? '#16a34a' : netValue < 0 ? '#dc2626' : '#6b7280'
                }}>{displayValue}</strong></td>;
              })}
            </tr>
          </tbody>
        </table>
      </div>

      <div className="grid-2" style={{marginTop:14}}>
        <div className="panel"><div className="section-title" style={{marginTop:0}}>📊 Monthly Outcome (₪)</div><div className="chart-box"><canvas ref={mRef}></canvas></div></div>
        <div className="panel"><div className="section-title" style={{marginTop:0}}>📈 Monthly Net (₪)</div><div className="chart-box"><canvas ref={nRef}></canvas></div></div>
      </div>

      <div className="section-title">🔎 Details for Month</div>
      <div className="controls" style={{marginBottom:10}}>
        <select value={selectedMonth} onChange={(e)=>setSelectedMonth(e.target.value)}>{months.map(m=><option key={'m'+m} value={m}>{m}</option>)}</select>
        <span className="muted">Select month (tag) to focus below</span>
      </div>

      <div style={{overflowX:'auto', marginBottom:14}}>
        <table>
          <thead><tr><th>Category</th><th>Total (₪)</th></tr></thead>
          <tbody>
            {Object.keys(monthCategoryDataAll[selectedMonth]||{}).length? Object.keys(monthCategoryDataAll[selectedMonth]).sort((a,b)=>a.localeCompare(b)).map(cat=>{
              const cell=monthCategoryDataAll[selectedMonth][cat]||{total:0,subcategories:{}}; const subs=cell.subcategories||{}; const total=cell.total||0; const key='m_'+selectedMonth+'_'+cat; const exp=!!expanded[key];
              return (
                <React.Fragment key={'mrow_'+cat}>
                  <tr>
                    <td><button className="btn btn-xs" onClick={()=>setExpanded(p=>Object.assign({},p,{[key]:!p[key]}))}>{exp?'▾':'▸'}</button> <strong>{cat}</strong></td>
                    <td><strong style={{color: total > 0 ? '#16a34a' : total < 0 ? '#dc2626' : 'inherit'}}>
                      {total !== 0 ? (total > 0 ? '+' : '') + '₪' + fmt2(Math.abs(total)) : '₪0.00'}
                    </strong></td>
                  </tr>
                  {exp && Object.keys(subs).sort((a,b)=>a.localeCompare(b)).map(s=>{
                    var subData = subs[s];
                    var subValue = typeof subData === 'number' ? subData : subData.total;
                    const displayValue = subValue !== 0 ? (subValue > 0 ? '+' : '') + '₪' + fmt2(Math.abs(subValue)) : '₪0.00';
                    return <tr key={'mrow_'+cat+'_'+s}><td className="muted" style={{paddingLeft:42}}>↳ {s}</td><td style={{color: subValue > 0 ? '#16a34a' : subValue < 0 ? '#dc2626' : 'inherit'}}>{displayValue}</td></tr>;
                  })}
                </React.Fragment>
              );
            }) : <tr><td colSpan="2" style={{textAlign:'center'}} className="muted">No categories in this month.</td></tr>}
            {selectedMonth && (monthNet[selectedMonth] || Object.keys(monthCategoryDataAll[selectedMonth]||{}).length) && (
              <tr style={{borderTop: '2px solid #e5e7eb', backgroundColor: '#f9fafb'}}>
                <td><strong>Net (Income - Expenses)</strong></td>
                <td><strong style={{color: (monthNet[selectedMonth]&&monthNet[selectedMonth].net||0) > 0 ? '#16a34a' : (monthNet[selectedMonth]&&monthNet[selectedMonth].net||0) < 0 ? '#dc2626' : 'inherit'}}>
                  {(() => {
                    const netValue = Number((monthNet[selectedMonth]&&monthNet[selectedMonth].net)||0);
                    return netValue !== 0 ? (netValue > 0 ? '+' : '') + '₪' + fmt2(Math.abs(netValue)) : '₪0.00';
                  })()}
                </strong></td>
              </tr>
            )}
          </tbody>
        </table>
      </div>

      <div className="controls" style={{marginBottom:10}}>
        <span className="muted">Sub-category pie for category:</span>
        <select value={subPieCat} onChange={(e)=>setSubPieCat(e.target.value)}>
          {monthCats.filter(c => {
            const mcd = monthCategoryDataAll[selectedMonth] || {};
            return mcd[c] && (mcd[c].type || 'Expense') === 'Expense';
          }).map(c => <option key={'spc_'+c} value={c}>{c}</option>)}
        </select>
      </div>

      <div className="grid-2">
        <div className="panel"><div className="section-title" style={{marginTop:0}}>🧩 Categories (Outcome)</div><div className="chart-box"><canvas ref={catRef}></canvas></div></div>
        <div className="panel"><div className="section-title" style={{marginTop:0}}>🍰 Sub-categories - {subPieCat || '-'}</div><div className="chart-box"><canvas ref={subRef}></canvas></div></div>
      </div>
    </div>
  );
}

/* ---------- Statistics Tab ---------- */
function StatisticsTab({past, categories}){
  // State for user selections
  const [selectedYears, setSelectedYears] = React.useState([]); // array of numbers
  const [tagsByYear, setTagsByYear] = React.useState({}); // {year: [tags...]}
  const [selectedType, setSelectedType] = React.useState('Expense'); // 'Expense' | 'Income'
  const [selectedCategories, setSelectedCategories] = React.useState([]); // array of category names
  const [selectedSubcategories, setSelectedSubcategories] = React.useState([]); // array of subcategory names
  const [activeQuickSelect, setActiveQuickSelect] = React.useState(null); // Track which quick select is active: 'last3', 'last6', 'alltime', or null
  
  // Statistics results
  const [statsData, setStatsData] = React.useState(null);
  const [error, setError] = React.useState('');
  const [calculating, setCalculating] = React.useState(false);
  
  // Derive available years and tags from past data
  const availableYearsAndTags = React.useMemo(() => {
    const yearTagMap = {}; // { year: Set(tags) }
    
    (past || []).forEach(tx => {
      if (!tx) return;
      
      try {
        // Prefer the explicit year field; fall back to parsing from date
        let year = tx.year ? parseInt(tx.year) : 0;
        if (!year && tx.date) {
          const dateStr = String(tx.date);
          if (dateStr.length >= 4) year = parseInt(dateStr.substring(0, 4));
        }
        // Parse tag - support both new "month/year" format and old numeric format
        let tag = 0;
        const rawTag = String(tx.tag || tx.month_tag || '');
        if (rawTag.includes('/')) {
          const parts = rawTag.split('/');
          tag = parseInt(parts[0]) || 0;
          if (!year) {
            const yr = parseInt(parts[1]) || 0;
            year = yr < 100 ? yr + 2000 : yr;
          }
        } else {
          tag = parseInt(tx.month_tag || tx.tag || 0);
        }
        
        if (!year || !tag) return;
        
        if (!yearTagMap[year]) {
          yearTagMap[year] = new Set();
        }
        yearTagMap[year].add(parseInt(tag));
      } catch (e) {
        // Skip invalid entries
      }
    });
    
    // Convert Sets to sorted arrays
    const result = {};
    Object.keys(yearTagMap).forEach(year => {
      result[parseInt(year)] = Array.from(yearTagMap[year]).sort((a, b) => a - b);
    });
    
    return result;
  }, [past]);
  
  const availableYears = React.useMemo(() => {
    return Object.keys(availableYearsAndTags).map(y => parseInt(y)).sort((a, b) => b - a);
  }, [availableYearsAndTags]);
  
  const categoryOptions = React.useMemo(() => {
    return Object.keys(categories || {}).sort();
  }, [categories]);
  
  const subcategoryOptions = React.useMemo(() => {
    // Get all subcategories for all selected categories
    const allSubs = new Set();
    selectedCategories.forEach(cat => {
      const subs = categories[cat] || [];
      subs.forEach(sub => allSubs.add(sub));
    });
    return Array.from(allSubs).sort();
  }, [selectedCategories, categories]);
  
  // Count selected month cells
  const selectedMonthCount = React.useMemo(() => {
    let count = 0;
    selectedYears.forEach(year => {
      const tags = tagsByYear[year] || [];
      count += tags.length;
    });
    return count;
  }, [selectedYears, tagsByYear]);
  
  // Toggle year selection
  function toggleYear(year) {
    if (selectedYears.includes(year)) {
      // Deselect year
      const newYears = selectedYears.filter(y => y !== year);
      const newTagsByYear = {...tagsByYear};
      delete newTagsByYear[year];
      setSelectedYears(newYears);
      setTagsByYear(newTagsByYear);
    } else {
      // Select year (but don't auto-select any tags yet)
      setSelectedYears([...selectedYears, year]);
    }
  }
  
  // Toggle tag for a specific year
  function toggleTag(year, tag) {
    const currentTags = tagsByYear[year] || [];
    let newTags;
    
    if (currentTags.includes(tag)) {
      newTags = currentTags.filter(t => t !== tag);
    } else {
      newTags = [...currentTags, tag].sort((a, b) => a - b);
    }
    
    setTagsByYear({
      ...tagsByYear,
      [year]: newTags
    });
  }
  
  // Quick filter: Last 3 Months (auto-calculate)
  function quickFilterLast3() {
    // Find the 3 most recent (year, tag) pairs
    const pairs = [];
    Object.keys(availableYearsAndTags).forEach(year => {
      availableYearsAndTags[year].forEach(tag => {
        pairs.push({ year: parseInt(year), tag });
      });
    });
    
    // Sort by year desc, then tag desc
    pairs.sort((a, b) => {
      if (a.year !== b.year) return b.year - a.year;
      return b.tag - a.tag;
    });
    
    const last3 = pairs.slice(0, 3);
    
    // Build selection
    const years = [...new Set(last3.map(p => p.year))];
    const tagMap = {};
    last3.forEach(p => {
      if (!tagMap[p.year]) tagMap[p.year] = [];
      tagMap[p.year].push(p.tag);
    });
    
    setSelectedYears(years);
    setTagsByYear(tagMap);
    setActiveQuickSelect('last3');

    // Auto-calculate using server-side quick filter (avoids stale closure)
    calculateStatistics('last3');
  }
  
  // Quick filter: Last 6 Months
  function quickFilterLast6() {
    const pairs = [];
    Object.keys(availableYearsAndTags).forEach(year => {
      availableYearsAndTags[year].forEach(tag => {
        pairs.push({ year: parseInt(year), tag });
      });
    });
    
    pairs.sort((a, b) => {
      if (a.year !== b.year) return b.year - a.year;
      return b.tag - a.tag;
    });
    
    const last6 = pairs.slice(0, 6);
    
    const years = [...new Set(last6.map(p => p.year))];
    const tagMap = {};
    last6.forEach(p => {
      if (!tagMap[p.year]) tagMap[p.year] = [];
      tagMap[p.year].push(p.tag);
    });
    
    setSelectedYears(years);
    setTagsByYear(tagMap);
    setActiveQuickSelect('last6');

    // Auto-calculate using server-side quick filter
    calculateStatistics('last6');
  }
  
  // Quick filter: All Time
  function quickFilterAllTime() {
    const years = Object.keys(availableYearsAndTags).map(y => parseInt(y));
    const tagMap = {};
    years.forEach(year => {
      tagMap[year] = availableYearsAndTags[year];
    });
    
    setSelectedYears(years);
    setTagsByYear(tagMap);
    setActiveQuickSelect('alltime');

    // Auto-calculate using server-side quick filter
    calculateStatistics('alltime');
  }
  
  // Clear all filters
  function clearFilters() {
    setSelectedYears([]);
    setTagsByYear({});
    setSelectedCategories([]);
    setSelectedSubcategories([]);
    setStatsData(null);
    setError('');
    setActiveQuickSelect(null);
  }
  
  // Toggle category selection - NEW: auto-select all subcategories
  function toggleCategory(cat) {
    if (selectedCategories.includes(cat)) {
      // Deselecting: remove category and its subcategories
      setSelectedCategories(selectedCategories.filter(c => c !== cat));
      const subsToRemove = categories[cat] || [];
      setSelectedSubcategories(selectedSubcategories.filter(s => !subsToRemove.includes(s)));
    } else {
      // Selecting: add category and auto-select all its subcategories
      setSelectedCategories([...selectedCategories, cat]);
      const subsToAdd = categories[cat] || [];
      const newSubs = [...new Set([...selectedSubcategories, ...subsToAdd])];
      setSelectedSubcategories(newSubs);
    }
    setActiveQuickSelect(null); // Clear quick select when manually changing
  }
  
  // Toggle subcategory
  function toggleSubcategory(sub) {
    if (selectedSubcategories.includes(sub)) {
      setSelectedSubcategories(selectedSubcategories.filter(s => s !== sub));
    } else {
      setSelectedSubcategories([...selectedSubcategories, sub]);
    }
    setActiveQuickSelect(null); // Clear quick select when manually changing
  }
  
  // Select All Categories - NEW
  function selectAllCategories() {
    const allCats = categoryOptions;
    setSelectedCategories(allCats);
    // Select all subcategories too
    const allSubs = new Set();
    allCats.forEach(cat => {
      (categories[cat] || []).forEach(sub => allSubs.add(sub));
    });
    setSelectedSubcategories(Array.from(allSubs));
    setActiveQuickSelect(null);
  }
  
  // Clear All Categories - NEW
  function clearAllCategories() {
    setSelectedCategories([]);
    setSelectedSubcategories([]);
    setActiveQuickSelect(null);
  }
  
  // Select All Subcategories - NEW
  function selectAllSubcategories() {
    setSelectedSubcategories(subcategoryOptions);
    setActiveQuickSelect(null);
  }
  
  // Clear All Subcategories - NEW
  function clearAllSubcategories() {
    setSelectedSubcategories([]);
    setActiveQuickSelect(null);
  }
  
  // Calculate statistics
  async function calculateStatistics(quickFilter = 'none') {
    if (selectedMonthCount < 2 && quickFilter === 'none') {
      setError('Select at least two months to calculate statistics.');
      setStatsData(null);
      return;
    }
    
    setError('');
    setCalculating(true);
    
    try {
      const payload = {
        years: selectedYears,
        tagsByYear: Object.keys(tagsByYear).reduce((acc, year) => {
          acc[year] = tagsByYear[year];
          return acc;
        }, {}),
        type: selectedType,
        categories: selectedCategories,
        subcategories: selectedSubcategories,
        quickFilter
      };
      
      const result = await API.getStatistics(payload);
      
      if (result.error) {
        setError(result.error);
        setStatsData(null);
      } else {
        setStatsData(result);
      }
    } catch (e) {
      setError('Failed to calculate statistics: ' + e.message);
      setStatsData(null);
    } finally {
      setCalculating(false);
    }
  }
  
  if (!past || past.length === 0) {
    return (
      <div className="panel">
        <div className="section-title">📊 Statistics Dashboard</div>
        <div className="muted">No transaction data available. Upload data first in the Transactions or Data tabs.</div>
      </div>
    );
  }
  
  return (
    <div style={{maxWidth: '1200px', margin: '0 auto', padding: '0 16px'}}>
      {/* Page Header */}
      <div style={{marginBottom: 24}}>
        <div className="section-title" style={{fontSize: 28, marginBottom: 6}}>📊 Statistics Dashboard</div>
        <div className="section-sub" style={{fontSize: 14, color: '#667085'}}>
          Analyze monthly {selectedType.toLowerCase()} patterns across selected time periods
        </div>
      </div>
      
      {/* Filter Card */}
      <div className="panel" style={{marginBottom: 24, borderRadius: 16, padding: 24}}>
        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20}}>
          <div>
            <h3 style={{margin: 0, fontSize: 18, fontWeight: 700, color: '#30334b'}}>Filter Options</h3>
            <p style={{margin: '4px 0 0', fontSize: 13, color: '#667085'}}>
              Select time periods, type, and categories to analyze
            </p>
          </div>
          <div style={{
            padding: '6px 12px',
            backgroundColor: selectedMonthCount >= 2 ? '#dcfce7' : '#fee2e2',
            color: selectedMonthCount >= 2 ? '#065f46' : '#991b1b',
            borderRadius: 16,
            fontSize: 12,
            fontWeight: 700
          }}>
            {selectedMonthCount} month{selectedMonthCount !== 1 ? 's' : ''} selected
          </div>
        </div>
        
        {/* TIME RANGE SECTION */}
        <div style={{
          marginBottom: 24,
          padding: 16,
          background: '#f9fafb',
          borderRadius: 12,
          border: '1px solid #e5e7eb'
        }}>
          <h4 style={{margin: '0 0 4px 0', fontSize: 15, fontWeight: 700, color: '#30334b'}}>
            ⏱️ Time Range
          </h4>
          <p style={{margin: '0 0 12px 0', fontSize: 12, color: '#667085'}}>
            Choose which months to include in the analysis
          </p>
          
          {/* Quick Filters */}
          <div style={{marginBottom: 16}}>
            <label style={{display: 'block', fontSize: 13, fontWeight: 600, color: '#30334b', marginBottom: 8}}>
              Quick Select
            </label>
            <p style={{margin: '0 0 8px 0', fontSize: 12, color: '#667085', fontStyle: 'italic'}}>
              Use Quick Select or manually choose months below
            </p>
            <div style={{display: 'flex', gap: 8, flexWrap: 'wrap'}}>
              <button 
                className={'btn btn-xs ' + (activeQuickSelect === 'last3' ? 'primary' : '')}
                onClick={quickFilterLast3}
                style={{
                  borderRadius: 20,
                  background: activeQuickSelect === 'last3' ? 'linear-gradient(180deg,#7c3aed,#6d28d9)' : '',
                  color: activeQuickSelect === 'last3' ? '#fff' : '',
                  boxShadow: activeQuickSelect === 'last3' ? '0 4px 8px rgba(124,58,237,0.25)' : '',
                  border: activeQuickSelect === 'last3' ? 'none' : ''
                }}
              >
                {activeQuickSelect === 'last3' && '✓ '}Last 3 Months
              </button>
              <button 
                className={'btn btn-xs ' + (activeQuickSelect === 'last6' ? 'primary' : '')}
                onClick={quickFilterLast6}
                style={{
                  borderRadius: 20,
                  background: activeQuickSelect === 'last6' ? 'linear-gradient(180deg,#7c3aed,#6d28d9)' : '',
                  color: activeQuickSelect === 'last6' ? '#fff' : '',
                  boxShadow: activeQuickSelect === 'last6' ? '0 4px 8px rgba(124,58,237,0.25)' : '',
                  border: activeQuickSelect === 'last6' ? 'none' : ''
                }}
              >
                {activeQuickSelect === 'last6' && '✓ '}Last 6 Months
              </button>
              <button 
                className={'btn btn-xs ' + (activeQuickSelect === 'alltime' ? 'primary' : '')}
                onClick={quickFilterAllTime}
                style={{
                  borderRadius: 20,
                  background: activeQuickSelect === 'alltime' ? 'linear-gradient(180deg,#7c3aed,#6d28d9)' : '',
                  color: activeQuickSelect === 'alltime' ? '#fff' : '',
                  boxShadow: activeQuickSelect === 'alltime' ? '0 4px 8px rgba(124,58,237,0.25)' : '',
                  border: activeQuickSelect === 'alltime' ? 'none' : ''
                }}
              >
                {activeQuickSelect === 'alltime' && '✓ '}All Time
              </button>
            </div>
          </div>
        
          {/* Year Selection */}
          <div style={{marginBottom: 16}}>
            <label style={{display: 'block', fontSize: 13, fontWeight: 600, color: '#30334b', marginBottom: 8}}>
              Years
            </label>
            <div style={{display: 'flex', flexWrap: 'wrap', gap: 8}}>
              {availableYears.map(year => (
                <button
                  key={year}
                  className={'btn btn-xs ' + (selectedYears.includes(year) ? 'primary' : '')}
                  onClick={() => { toggleYear(year); setActiveQuickSelect(null); }}
                  style={{
                    borderRadius: 20,
                    minWidth: 60,
                    padding: '8px 16px',
                    background: selectedYears.includes(year) ? 'linear-gradient(180deg,#7c3aed,#6d28d9)' : '',
                    color: selectedYears.includes(year) ? '#fff' : '',
                    boxShadow: selectedYears.includes(year) ? '0 4px 8px rgba(124,58,237,0.25)' : '',
                    border: selectedYears.includes(year) ? 'none' : ''
                  }}
                >
                  {selectedYears.includes(year) && '✓ '}{year}
                </button>
              ))}
            </div>
          </div>
        
          {/* Tags per Year */}
          {selectedYears.length > 0 && (
            <div>
              <label style={{display: 'block', fontSize: 13, fontWeight: 600, color: '#30334b', marginBottom: 8}}>
                Months (Tags) {selectedMonthCount > 0 && (
                  <span style={{
                    marginLeft: 8,
                    padding: '2px 8px',
                    background: '#ede9fe',
                    color: '#6b46c1',
                    borderRadius: 12,
                    fontSize: 11,
                    fontWeight: 700
                  }}>
                    {selectedMonthCount} selected

/* ---------- Statistics Pie Chart ---------- */
function StatsPieChart({statsData, selectedCategories}) {
  const pieRef = React.useRef(null);
  const pieChartRef = React.useRef(null);
  React.useEffect(() => {
    if (pieChartRef.current) { try { pieChartRef.current.destroy(); } catch(_){} pieChartRef.current = null; }
    if (!pieRef.current || !statsData || !statsData.top_categories || !statsData.top_categories.length) return;
    const catTotals = {};
    statsData.top_categories.forEach(c => { catTotals[c.name] = c.total; });
    const labels = Object.keys(catTotals);
    const data = labels.map(l => catTotals[l]);
    if (!labels.length) return;
    const ChartLib = window.Chart;
    const DLabels = window.ChartDataLabels;
    if (DLabels && !window.__mtDLReg) { ChartLib.register(DLabels); window.__mtDLReg = true; }
    const total = data.reduce((a,b) => a+b, 0);
    pieChartRef.current = new ChartLib(pieRef.current.getContext('2d'), {
      type: 'pie',
      data: { labels, datasets: [{ data }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right' },
          datalabels: DLabels ? {
            display: function(context) {
              const numSlices = context.dataset.data.length;
              const value = context.dataset.data[context.dataIndex];
              const pct = total ? (value / total * 100) : 0;
              // Dynamic threshold: fewer slices = show more labels, many slices = hide small ones
              const threshold = numSlices <= 4 ? 2 : numSlices <= 7 ? 5 : numSlices <= 10 ? 8 : 12;
              return pct >= threshold;
            },
            formatter: (value) => {
              const pct = total ? (value / total * 100).toFixed(1) : 0;
              return pct + '%';
            },
            color: '#fff',
            font: { weight: 'bold', size: 12 }
          } : { display: false },
          tooltip: {
            callbacks: {
              label: function(context) {
                const label = context.label || '';
                const value = context.parsed || 0;
                const pct = total ? (value / total * 100).toFixed(1) : 0;
                return [label + ': ₪' + fmt2(value), pct + '%'];
              }
            }
          }
        }
      }
    });
    return () => { if (pieChartRef.current) { try { pieChartRef.current.destroy(); } catch(_){} } };
  }, [statsData]);
  return (
    <div className="panel" style={{marginBottom: 24, borderRadius: 16, padding: 24}}>
      <h3 style={{margin: '0 0 12px', fontSize: 18, fontWeight: 700, color: '#30334b'}}>
        🧩 Pie Chart Of Selected Period & Categories
      </h3>
      <div className="chart-box" style={{height: 320}}><canvas ref={pieRef}></canvas></div>
    </div>
  );
}

/* ---------- Settings (renamed, but keeping for backward compatibility - will be hidden) ---------- */
function SettingsTab({ user, past, categories, stage, settings, onReload }){
  const [dateFormat, setDateFormat] = React.useState(settings.dateFormat || 'YYYY-MM-DD');
  const [currency, setCurrency] = React.useState(settings.currency || 'ILS');
  const [allowedCurrencies, setAllowedCurrencies] = React.useState(settings.allowedCurrencies || ["ILS","USD"]);
  const allCurrencies = ["ILS","USD","EUR","GBP"];
  React.useEffect(()=>{
    setDateFormat(settings.dateFormat||'YYYY-MM-DD');
    setCurrency(settings.currency||'ILS');
    setAllowedCurrencies(settings.allowedCurrencies||["ILS","USD"]);
  },[settings.dateFormat,settings.currency,settings.allowedCurrencies]);

  function toggleAllowedCurrency(cur) {
    setAllowedCurrencies(prev => prev.includes(cur) ? prev.filter(c=>c!==cur) : [...prev, cur]);
  }

  function savePrefs(){
    API.saveSettings({dateFormat,currency,allowedCurrencies}).then(()=>{
      alert('Preferences saved.');
      if (typeof onReload === 'function') onReload(); // reload app state (settings)
    });
  }
  function exportAll(){
    const payload={ user, categories, past_data: past, current_month:stage, settings:{dateFormat,currency,allowedCurrencies,theme:settings.theme||'light'} };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`moneytron_${user}_export.json`; a.click(); URL.revokeObjectURL(a.href);
  }
  function onImport(e){
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const reader=new FileReader(); reader.onload=function(){ try{ const data=JSON.parse(reader.result); API.importData({categories:data.categories,past_data:data.past_data,current_month:data.current_month,settings:data.settings}).then(()=>{ alert('Imported successfully.'); onReload&&onReload(); }); }catch(err){ alert('Invalid file: '+err.message);} };
    reader.readAsText(f,'utf-8'); e.target.value='';
  }
  function clearAll(){ if(!confirm('Clear ALL data for this user? This cannot be undone.')) return; API.clearAll().then(()=>{ alert('All user data cleared.'); onReload&&onReload(); }); }

  // Simple account info
  const monthsSet={}; let lastTxVar=null, totalSpending=0;
  (past||[]).forEach(r=>{ const d=Number(r.debit||0); if(String(r.type||'').toLowerCase()!=='income') totalSpending+=d; const m=Number(r.tag||0); if(m>0) monthsSet[m]=1; if(r.date){ if(!lastTxVar || dayjs(r.date).isAfter(dayjs(lastTxVar.date))) lastTxVar=r; }});
  const avgMonthly=Object.keys(monthsSet).length? totalSpending/Object.keys(monthsSet).length : 0;
  const lastTxLabel=lastTxVar ? `${lastTxVar.date} - ${lastTxVar.name}` : 'No transactions yet';

  return (
    <div className="panel">
      <div className="section-title">⚙️ Settings &amp; Profile for {user}</div>
      <div className="thin-underline"></div>
      <div className="section-sub">Manage your account, data, and application preferences.</div>

      <div className="grid-2">
        <div className="panel">
          <div className="section-title">🗂️ Data Management</div>
          <div className="dm-grid">
            <div className="dm-left">
              <button className="btn" onClick={exportAll}>⬇️ Export All Data</button>
              <label className="btn">📨 Import Data<input type="file" accept="application/json,.json" style={{display:'none'}} onChange={onImport}/></label>
            </div>
            <div className="dm-right">
              <button className="btn danger" onClick={clearAll}>🧹 Clear All Data</button>
              <div className="danger-caption">⚠️ This action cannot be undone.</div>
            </div>
          </div>
        </div>

        <div className="panel">
          <div className="section-title">🧩 Preferences</div>
          <div className="controls" style={{flexDirection:'column', alignItems:'stretch'}}>
            <label>Date Format</label>
            <select value={dateFormat} onChange={(e)=>setDateFormat(e.target.value)}>
              <option value="YYYY-MM-DD">YYYY-MM-DD ({dayjs().format('YYYY-MM-DD')})</option>
              <option value="DD/MM/YYYY">DD/MM/YYYY ({dayjs().format('DD/MM/YYYY')})</option>
              <option value="MM/DD/YYYY">MM/DD/YYYY ({dayjs().format('MM/DD/YYYY')})</option>
            </select>
            <label style={{marginTop:8}}>Default Currency</label>
            <select value={currency} onChange={(e)=>setCurrency(e.target.value)}>
              {allCurrencies.map(cur=>(<option key={cur} value={cur}>{cur}</option>))}
            </select>
            <label style={{marginTop:8}}>Allowed Currencies for Toggling</label>
            <div style={{display:'flex',gap:8,marginTop:4,marginBottom:8}}>
              {allCurrencies.map(cur=>(
                <button key={cur} className={"currency-toggle"+(allowedCurrencies.includes(cur)?" active":"")} type="button" onClick={()=>toggleAllowedCurrency(cur)} style={{fontWeight:allowedCurrencies.includes(cur)?800:400,background:allowedCurrencies.includes(cur)?'#d1fae5':'#eef2ff'}}>{cur}</button>
              ))}
            </div>
            <div style={{fontSize:12,color:'#888',marginBottom:8}}>Only selected currencies will be available for toggling in transactions/data tabs.</div>
            <div style={{marginTop:10}}><button className="btn primary" onClick={savePrefs}>Save Preferences</button></div>
          </div>
        </div>

        <div className="panel">
          <div className="section-title">👤 Account Info</div>
          <div className="controls" style={{flexDirection:'column', alignItems:'flex-start'}}>
            <div><strong>Username:</strong> {user}</div>
            <div><strong>Avg Monthly Spending:</strong> ₪{avgMonthly.toFixed(0)}</div>
            <div><strong>Last Transaction:</strong> {lastTxLabel}</div>
            <div><strong>Data Storage:</strong> User-specific files</div>
          </div>
        </div>

        <div className="panel">
          <div className="section-title">🔒 Change Password</div>
          <ChangePasswordForm/>
        </div>

        <div className="panel">
          <div className="section-title">ℹ️ App Information</div>
          <ul style={{marginTop:6}}>
            <li>MoneyTron Multi-User v4.0</li>
            <li>Multi-user support</li>
            <li>Personal categories</li>
            <li>Monthly workflow</li>
            <li>Data visualization</li>
            <li>Export/Import capabilities</li>
            <li>Privacy: All data stored securely on your server.</li>
          </ul>
        </div>
      </div>
    </div>

/* ---------- Change Password Form ---------- */
function ChangePasswordForm({onDone}){
  const [oldPw,setOldPw]=React.useState('');
  const [newPw,setNewPw]=React.useState('');
  const [confirmPw,setConfirmPw]=React.useState('');
  const [msg,setMsg]=React.useState('');
  const [err,setErr]=React.useState('');
  function submit(){
    setMsg(''); setErr('');
    if(!newPw){ setErr('New password cannot be empty.'); return; }
    if(newPw !== confirmPw){ setErr('Passwords do not match.'); return; }
    API.changePassword(oldPw, newPw).then(r=>{
      if(!r.ok){ setErr(r.error || 'Failed to change password.'); return; }
      setMsg('Password changed successfully!'); setOldPw(''); setNewPw(''); setConfirmPw('');
      if(onDone) setTimeout(onDone, 1200);
    }).catch(e=>setErr('Error: '+e.message));
  }
  return (
    <div className="controls" style={{flexDirection:'column', alignItems:'stretch'}}>
      <label>Current Password</label>
      <input type="password" value={oldPw} onChange={e=>setOldPw(e.target.value)} placeholder="Enter current password"/>
      <label style={{marginTop:8}}>New Password</label>
      <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="Enter new password"/>
      <label style={{marginTop:8}}>Confirm New Password</label>
      <input type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} placeholder="Confirm new password" onKeyDown={e=>{if(e.key==='Enter') submit();}}/>
      {err && <div style={{color:'#dc2626',fontSize:13,marginTop:6,fontWeight:600}}>{err}</div>}
      {msg && <div style={{color:'#16a34a',fontSize:13,marginTop:6,fontWeight:600}}>{msg}</div>}
      <div style={{marginTop:10}}><button className="btn primary" onClick={submit}>Change Password</button></div>
    </div>
  );
}

  function doSignup(name, password, email){ 
    API.signup(name, password, email).then(r=>{ 
      if(!r.ok){ 
        if(window._loginSetErr) window._loginSetErr(r.error || 'Sign up failed');
        return; 
      }
      setUser(name); setTab('transactions'); return reload(); 
    }).catch(err=>{
      if(window._loginSetErr) window._loginSetErr('Sign up failed: '+err.message);
    }); 
  }

  if(!user) return <LoginView onLogin={doLogin} onSignup={doSignup}/>;
  function handleDataDirty(dirty) { dataChangesRef.current = dirty; setDataDirty(dirty); }

  function trySetTab(id, filter) {
    if (tab === 'data' && dataChangesRef.current) {
      setPendingTab(id);
      setPendingFilter(filter || null);
      setShowUnsavedModal(true);
      return;
    }
    if (tab === 'transactions' && stage.length) { API.saveStage(stage).catch(()=>{}); }
    setDataFilter(filter || null);
    setTab(id);
  }
  function confirmDiscardChanges() {
    setShowUnsavedModal(false);
    dataChangesRef.current = false;
    setDataDirty(false);
    if (pendingTab) {
      setDataFilter(pendingFilter);
      setTab(pendingTab);
      setPendingTab(null);
      setPendingFilter(null);
    }
  }
  function cancelTabSwitch() {
    setShowUnsavedModal(false);
    setPendingTab(null);
    setPendingFilter(null);
  }

  function tabBtn(id,label,icon){ return <button className={'tab'+(tab===id?' active':'')} onClick={()=>trySetTab(id)}>{icon} {label}</button>; }
  function onSavedTx(){ setStage([]); reload().then(()=> trySetTab('summary')); }
  function navigateToData(filter){ trySetTab('data', filter); }

  return (
    <div className="wrap">
      <h1 className="title">MoneyTron - Multi-User Money Tracker</h1>
      {/* Unsaved changes modal */}
      {showUnsavedModal && (
        <div className="modal-overlay" onClick={cancelTabSwitch}>
          <div className="modal-card" onClick={e=>e.stopPropagation()}>
            <h3>⚠️ Unsaved Changes</h3>
            <p style={{margin:'8px 0 16px',fontSize:14,color:'#667085'}}>You have unsaved changes in the Data tab. Do you want to discard them?</p>
            <div className="modal-actions">
              <button className="btn" onClick={cancelTabSwitch}>Cancel (Stay)</button>
              <button className="btn danger" onClick={confirmDiscardChanges}>Discard & Switch</button>
            </div>
          </div>
        </div>
      )}
      <div className="frame">
        <div className="topbar">
          <div className="pill welcome">Welcome, {user}!</div>
          <button className="ghost btn" onClick={()=>setShowChangePwModal(true)}>🔒 Change Password</button>
          <button className="ghost btn" onClick={()=>{ API.logout().then(()=>setUser(null)); }}>Switch User</button>
        </div>
        {showChangePwModal && (
          <div className="modal-overlay" onClick={()=>setShowChangePwModal(false)}>
            <div className="modal-card" onClick={e=>e.stopPropagation()}>
              <h3>🔒 Change Password</h3>
              <ChangePasswordForm onDone={()=>setShowChangePwModal(false)}/>
            </div>
          </div>
        )}
        <div className="tabs">
          {tabBtn('transactions','Transactions','💰')}
          {tabBtn('summary','Summary','📊')}
          {tabBtn('statistics','Statistics','📈')}
          {tabBtn('data','Data','📄')}
          {tabBtn('categories','Categories','📚')}
          {tabBtn('tutorial','Tutorial','📖')}
        </div>
        {tab==='transactions' && <TransactionsTab rows={stage} setRows={setStage} categories={categories} onSaved={onSavedTx}/>}
        {tab==='data' && <DataTab key={dataFilter ? JSON.stringify(dataFilter) : 'default'} past={past} categories={categories} onSaved={(rows)=>{ dataChangesRef.current=false; setDataDirty(false); reload(); }} initialFilter={dataFilter} onDirtyChange={handleDataDirty}/>} 
        {tab==='summary' && <SummaryTab past={past} active={tab==='summary'} onNavigateToData={navigateToData}/>} 
        {tab==='categories' && <CategoriesTab user={user} categories={categories} onSaved={setCategories}/>} 
        {tab==='statistics' && <StatisticsTab past={past} categories={categories}/>}
        {tab==='tutorial' && <TutorialTab/>}
      </div>
    </div>
  );
}

ReactDOM.render(<React.Fragment><App/><FeedbackButton/></React.Fragment>, document.getElementById('root'));
  </script>
</body>
</html>
