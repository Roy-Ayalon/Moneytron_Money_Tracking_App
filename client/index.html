      --muted:#667085;

      --card:#ffffff;

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,"Noto Sans";
      color:var(--ink);
      background: radial-gradient(1200px 700px at 80% 20%, #8b5cf6 0%, #6d28d9 55%, #5b21b6 100%);

    .wrap{ width:min(1600px,98vw); margin:24px auto; padding:24px; }

    .frame{ background:rgba(255,255,255,.88); backdrop-filter: blur(6px); border-radius:18px; padding:16px; margin-top:12px; }
    .panel{ background:var(--card); border-radius:16px; padding:20px 24px; box-shadow:0 10px 20px rgb(8 24 71 / 8%); max-width:100%; overflow:auto; }

    .topbar{ display:flex; gap:12px; justify-content:center; align-items:center; margin-bottom:14px; }
    .pill{ border:none; border-radius:999px; padding:10px 16px; background:linear-gradient(180deg,#7c3aed,#6d28d9); color:#fff; font-weight:700; box-shadow:0 6px 14px rgba(91,33,182,.35); transition:transform .12s, box-shadow .12s; }

    .pill.welcome{ cursor:default; box-shadow:none; }
    .pill.welcome:hover{ transform:none; box-shadow:none; }
    .ghost{ background:#eef2ff; color:#3949ab; box-shadow:none; font-weight:600; }
    .ghost:hover{ filter:brightness(.98); transform:translateY(-1px); }

    .tabs{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:10px 0 18px; }
    .tab{ position:relative; overflow:hidden; border:none; border-radius:999px; padding:10px 18px; background:#f2f3ff; color:#3d2c7a; font-weight:700; box-shadow:inset 0 0 0 1px #ecebff; transition:all .2s; }
    .tab:hover{ transform:translateY(-1px); box-shadow:0 6px 12px rgba(91,33,182,.12); }
    .tab.active{ background:linear-gradient(180deg,#7c3aed,#6d28d9); color:#fff; box-shadow:0 6px 14px rgba(91,33,182,.35); }

    .section-sub{ color:#667085; font-size:14px; margin:0 0 12px; }
    .thin-underline{ height:2px; background:linear-gradient(90deg,#7c3aed,#6d28d9); border-radius:999px; width:100%; margin:4px 0 10px; opacity:.55; }

    .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin:10px 0 16px; }
    .kpi{ border-radius:16px; padding:16px; color:#fff; font-weight:800; text-align:center; }

    .k3{ background:linear-gradient(180deg,#e6762c,#b85916); }

<body>
  <div id="root" class="wrap"></div>

  <script type="text/babel" data-presets="react">
function fmt2(n){ n=Number(n); if(!isFinite(n)) return '0.00'; return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ---------- Feedback / Improvements Button (always visible) ---------- */
function FeedbackButton(){
  const [showModal, setShowModal] = React.useState(false);
  const [feedbackText, setFeedbackText] = React.useState('');
  const [feedbackName, setFeedbackName] = React.useState('');
  const [sent, setSent] = React.useState(false);
  const [sending, setSending] = React.useState(false);
  const [resultMsg, setResultMsg] = React.useState('');

  function sendFeedback(){
    if(!feedbackText.trim()) return;
    setSending(true);
    setResultMsg('');
    const name = feedbackName.trim() || 'Anonymous';
    fetch('/api/feedback', {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name, message: feedbackText})
    })
    .then(r => r.json())
    .then(data => {
      setSending(false);
      if (data.ok) {
        setSent(true);
        if (data.email_sent) {
          setResultMsg('Your feedback has been saved and emailed to the developer. Thank you!');
        } else if (!data.has_email) {
          setResultMsg('Your feedback has been saved! To enable email delivery, add your email in Sign Up.');
        } else {
          setResultMsg('Your feedback has been saved! Email delivery will be attempted when SMTP is configured.');
        }
        setTimeout(()=>{ setShowModal(false); setSent(false); setFeedbackText(''); setFeedbackName(''); setResultMsg(''); }, 3000);
      } else {
        setResultMsg('Failed to save feedback. Please try again.');
      }
    })
    .catch(err => {
      setSending(false);
      setResultMsg('Error: ' + err.message);
    });
  }

  return (
    <React.Fragment>
      <button className="feedback-fab" onClick={()=>setShowModal(true)} title="Send improvement ideas">
        💡 Send Idea
      </button>
      {showModal && (
        <div className="modal-overlay" onClick={()=>{setShowModal(false);setSent(false);}}>
          <div className="feedback-modal-card" onClick={e=>e.stopPropagation()}>
            {sent ? (
              <div style={{textAlign:'center',padding:'30px 0'}}>
                <div style={{fontSize:56,marginBottom:12}}>✅</div>
                <h3 style={{textAlign:'center'}}>Thank You!</h3>
                <p style={{color:'#667085',marginTop:8}}>{resultMsg}</p>
              </div>
            ) : (
              <React.Fragment>
                <h3>💡 Share Your Improvement Idea</h3>
                <p style={{color:'#667085',fontSize:14,margin:'6px 0 18px'}}>Help us make MoneyTron better! Your ideas are saved and sent to the developer.</p>
                <label style={{display:'block',fontWeight:700,fontSize:14,color:'#30334b',marginBottom:6}}>Your Name (optional)</label>
                <input type="text" placeholder="Your name" value={feedbackName} onChange={e=>setFeedbackName(e.target.value)} style={{marginBottom:14}} />
                <label style={{display:'block',fontWeight:700,fontSize:14,color:'#30334b',marginBottom:6}}>Your Idea / Suggestion</label>
                <textarea placeholder="What feature would you like to see? What could be improved? Any bugs to report?" value={feedbackText} onChange={e=>setFeedbackText(e.target.value)}/>
                <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
                  <span style={{fontSize:12,color:'#667085'}}>📧 Sent to: roy1.ayalon@gmail.com</span>
                </div>
                {resultMsg && <div style={{color:'#dc2626',fontSize:13,marginTop:6,fontWeight:600}}>{resultMsg}</div>}
                <div className="modal-actions">
                  <button className="btn" onClick={()=>{setShowModal(false);setSent(false);setResultMsg('');}}>Cancel</button>
                  <button className="btn primary" onClick={sendFeedback} disabled={!feedbackText.trim() || sending}>{sending ? '⏳ Sending...' : 'Send Feedback'}</button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

// Format date as DD-MM-YYYY consistently everywhere
function formatDMY(dateInput) {
  if (!dateInput) return '';
  let d;
  
  // Handle various input formats
  if (typeof dateInput === 'string') {
    // If already in DD-MM-YYYY format, return as-is
    if (/^\d{2}-\d{2}-\d{4}$/.test(dateInput)) {
      return dateInput;
    }
    // Parse ISO format YYYY-MM-DD to DD-MM-YYYY
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateInput)) {
      const [y, m, day] = dateInput.split('-');
      return `${day}-${m}-${y}`;
    }
    // Try parsing with dayjs
    d = dayjs(dateInput);
  } else if (dateInput instanceof Date) {
    d = dayjs(dateInput);
  } else {
    d = dayjs(dateInput);
  }
  
  if (d && d.isValid()) {
    return d.format('DD-MM-YYYY');
  }
  return String(dateInput);
}

// Parse DD-MM-YYYY to ISO YYYY-MM-DD for storage
function parseDMYtoISO(dmyStr) {
  if (!dmyStr) return '';
  const match = String(dmyStr).match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (match) {
    const [, day, month, year] = match;
    return `${year}-${month}-${day}`;
  }
  // Try to parse with dayjs if not in DD-MM-YYYY format
  const d = dayjs(dmyStr, 'DD-MM-YYYY', true);
  if (d.isValid()) {
    return d.format('YYYY-MM-DD');
  }
  return dmyStr;
}

// parseAmount: UI helper kept client-side for inline editing of amount fields
function parseAmount(v) {
  if (v == null || v === '') return 0;
  if (typeof v === 'number') return v;
  var s = String(v).trim();
  var neg = false;
  if (/^\(.*\)$/.test(s)) { neg = true; s = s.slice(1, -1); }
  if (/[-\u2212\u2013]\s*$/.test(s)) { neg = true; s = s.replace(/[-\u2212\u2013]\s*$/, ''); }
  s = s.replace(/[₪$€£\u200f\u200e\s]/g, '');
  if (s.indexOf('.') >= 0 && s.indexOf(',') >= 0) { s = s.replace(/\./g, '').replace(',', '.'); }
  else { s = s.replace(/,/g, ''); }
  s = s.replace(/[^0-9.\-]/g, '');
  var n = parseFloat(s);
  if (!isFinite(n)) return 0;
  return neg ? -Math.abs(n) : n;
}

      const autoed = result.transactions || [];
      // Merge with existing staged rows (to support multiple uploads for same month)

            <input type="number" value={uploadYear} onChange={e=>setUploadYear(Number(e.target.value))} min="2000" max="2100"/>
            <div className="modal-actions">
              <button className="btn" onClick={()=>{setShowUploadModal(false);setPendingFile(null);}} disabled={uploading}>Cancel</button>
              <button className="btn primary" onClick={doUpload} disabled={uploading}>{uploading?'⏳ Uploading…':'✅ Upload'}</button>
            </div>
          </div>
        </div>
      )}
      {msg && <div className="toast-bar">{msg}</div>}
      <div className="kpis">
        <div className="kpi k1">Total Transactions<span className="n">{(rows.length)}</span></div>
        <div className="kpi k2">Total Amount<span className="n">₪{fmt2(totalSigned)}</span></div>
        <div className="kpi k3">Categorized<span className="n">{(categorized)}</span></div>
        <div className="kpi k4">Need Categories<span className="n">{(needCat)}</span></div>
      </div>

      <div className="controls" style={{marginBottom:10}}>
        <div className="left" style={{display:'flex',alignItems:'center',gap:8}}>
          <input className="input-xs" type="text" placeholder="Search by name, amount, notes…" value={q} onChange={(e)=>setQ(e.target.value)}/>
          <button className="btn btn-xs" onClick={()=>setQ('')}>Clear</button>
        </div>
        <div className="right" style={{display:'flex',alignItems:'center',gap:8}}>
          <label className="btn">📁 Upload
            <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={onFileSelect}/>
          </label>
          <button className="btn" onClick={addManual}>+ Add Manual Row</button>
          <button className="btn danger" style={{marginLeft:10}} onClick={deleteAllTransactions}>🗑️ Delete All</button>
          <button className="btn primary" onClick={saveAll}>💾 Save All</button>
        </div>
      </div>

      <div className="panel">
        <table>
          <thead><tr>
            <th className="nosort">✖</th>
            {hdr('Tag','tag','w-tag')}
            <th className="w-date" onClick={()=>setSort('date')}>Date<br/><span style={{fontSize:'11px',fontWeight:600}}>(DD-MM-YYYY)</span>{sortKey==='date'?(sortDir==='asc'?' ↑':' ↓'):' ↑↓'}</th>
            {hdr('Name','name','w-name')}
            {hdr('Transaction Amount','amount','w-amt')}
            {hdr('Debit Amount (ILS)','debit','w-debit')}
            {hdr('Type','type')}
            {hdr('Category','category','w-cat')}
            {hdr('Sub-category','subcategory','w-sub')}
            {hdr('Notes','notes','w-notes')}
            {hdr('Vi','vi')}
          </tr></thead>
          <tbody>
            {view.length? view.map(r=>{
              const id=r.id || (r.tag+'_'+r.date+'_'+r.name);
              const manual=!!r.manual; const currency=r.currency||'ILS';
              // Map currency code to symbol
              const currencySymbols = { ILS: '₪', USD: '$', EUR: '€', GBP: '£' };
              return (
                <tr key={id} className={r.vi?'row-vi':''}>
                  <td style={{width:48}}><button className="btn danger" onClick={()=>delRow(id)}>✖</button></td>

                  <td className="w-tag">
                    {manual
                      ? <input 
                          type="text" 
                          value={r.tag_edit != null ? r.tag_edit : (String(r.tag||'').includes('/') ? r.tag : ((r.month_tag||r.tag||'') + '/' + String(r.year||'').slice(-2)))} 
                          onChange={(e)=>{
                            // Only allow digits and /
                            const v = e.target.value.replace(/[^0-9\/]/g, '');
                            patch(id,{tag_edit: v});
                          }}
                          onBlur={(e)=>{
                            const val = (r.tag_edit != null ? r.tag_edit : '').trim();
                            const tagMatch = val.match(/^0*(\d{1,2})\/(\d{2})$/);
                            if(tagMatch){
                              const mm=Number(tagMatch[1]), yy=Number(tagMatch[2])+2000;
                              if(mm>=1 && mm<=12){
                                const normalized = mm + '/' + tagMatch[2];
                                patch(id,{tag:normalized, month_tag:mm, year:yy, tag_edit:undefined, _tag_manual:true});
                              } else {
                                patch(id,{tag_edit:undefined});
                              }
                            } else {
                              patch(id,{tag_edit:undefined});
                            }
                          }}
                          placeholder="e.g. 2/26"
                          title="Month/Year (M/YY e.g. 2/26)"
                          style={{width:70,textAlign:'center'}}
                        />
                      : <span className="ro-tag" title="Month/Year">{String(r.tag||'').includes('/') ? r.tag : ((r.month_tag!=null ? r.month_tag : (r.tag!=null ? r.tag : '')) + '/' + String(r.year||'').slice(-2))}</span>}
                  </td>

                  <td className="w-date">
                    {manual ? (
                      <input 
                        type="text" 
                        placeholder="DD-MM-YYYY"
                        value={r.date_str || formatDMY(r.date_iso || r.date)} 
                        onChange={(e)=>{
                          // Only allow digits and dashes
                          const dmyValue = e.target.value.replace(/[^0-9\-]/g, '');
                          const isoValue = parseDMYtoISO(dmyValue);
                          const d = dayjs(isoValue);
                          const newMonth = d.isValid() ? d.month() + 1 : (r.month_tag || Number(String(r.tag||'').split('/')[0]) || 1);
                          const newYear = d.isValid() ? d.year() : (r.year || dayjs().year());
                          const updates = {
                            date: isoValue,
                            date_iso: isoValue,
                            date_str: dmyValue,
                            month_tag: newMonth,
                            year: newYear
                          };
                          // Only auto-update tag if user hasn't manually set it
                          if(!r._tag_manual){
                            updates.tag = newMonth + '/' + String(newYear).slice(-2);
                          }
                          patch(id, updates);
                        }}
                        onBlur={(e)=>{
                          // Validate DD-MM-YYYY format on blur
                          const val = (r.date_str || '').trim();
                          if(val && !/^\d{2}-\d{2}-\d{4}$/.test(val)){
                            // Try to auto-fix common patterns
                            const d = dayjs(parseDMYtoISO(val));
                            if(d.isValid()){
                              patch(id, {date_str: d.format('DD-MM-YYYY'), date: d.format('YYYY-MM-DD'), date_iso: d.format('YYYY-MM-DD')});
                            }
                          }
                        }}
                      />
                    ) : (
                      <input 
                        className="locked" 
                        readOnly={true} 
                        type="text" 
                        value={r.date_str || formatDMY(r.date_iso || r.date)}
                      />
                    )}
                  </td>

                  <td className="w-name" style={{textAlign:'center'}}>
                    {manual
                      ? <div className="cell-hscroll"><input className="fit" type="text" value={r.name||''} title={r.name||''} onChange={(e)=>patch(id,{name:e.target.value})}/></div>
                      : <div className="cell-hscroll ro-name" title={r.name||''}>{r.name||''}</div>}
                  </td>

                  <td className="w-amt">
                    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                      <button className="currency-toggle" onClick={()=>toggleCurrency(id)}>{currencySymbols[currency] || currency}</button>
                      {manual
                        ? <input className="num-input" type="text" value={r.amount_edit != null ? r.amount_edit : String(fmt2(r.amount))} onChange={e=>patch(id,{amount_edit:e.target.value})} onBlur={()=>{const amt=parseAmount(r.amount_edit!=null?r.amount_edit:r.amount);patch(id,{amount:Math.abs(amt)||0,amount_edit:undefined});}}/>
                        : <input className={'locked num-input'} readOnly={true} type="text" value={fmt2(r.amount)}/>
                      }
                    </div>
                  </td>

                  <td className="w-debit">
                    <input
                      className="num-input"
                      type="text"
                      value={(r.debit_edit != null ? r.debit_edit : String(fmt2(r.debit)))}
                      onChange={(e)=>onDebitEditChange(id, e.target.value)}
                      onBlur={()=>onDebitEditBlur(id)}
                    />
                  </td>

                  <td><button className={'type-pill '+(r.type==='Expense'?'type-exp':'type-inc')} onClick={()=>toggleType(id)}>{r.type}</button></td>
                  <td className="w-cat"><select value={r.category||''} onChange={(e)=>patch(id,{category:e.target.value, subcategory:''})}><option value="">— Select —</option>{Object.keys(categories).map(c=><option key={c} value={c}>{c}</option>)}</select></td>
                  <td className="w-sub"><select value={r.subcategory||''} onChange={(e)=>patch(id,{subcategory:e.target.value})}><option value="">—</option>{((categories[r.category])||[]).map(s=><option key={s} value={s}>{s}</option>)}</select></td>
                  <td className="w-notes" style={{textAlign:'left'}}><input type="text" value={r.notes||''} onChange={(e)=>patch(id,{notes:e.target.value})}/></td>
                  <td><input type="checkbox" checked={!!r.vi} onChange={(e)=>patch(id,{vi:e.target.checked})}/></td>
                </tr>
              );
            }) : <tr><td colSpan="11" style={{textAlign:'center',color:'#6b7280'}}>No Transactions Yet</td></tr>}
          </tbody>
        </table>
      </div>
    </React.Fragment>
  );
}

/* ---------- Data (PAST), Summary, Settings — unchanged from your last file ---------- */
/* (Keeping as-is for brevity) */

/* ---------- Data (PAST) — with filters for Tag, Category, Sub-category, Name ---------- */
function DataTab({past,categories,onSaved,initialFilter,onDirtyChange}){
  const [rows,setRows]=React.useState(Array.isArray(past)?past.slice():[]);
  const [q,setQ]=React.useState(''); const [sortKey,setSortKey]=React.useState('date'); const [sortDir,setSortDir]=React.useState('asc'); const [saving,setSaving]=React.useState(false);
  const [savedSnapshot,setSavedSnapshot]=React.useState(JSON.stringify(Array.isArray(past)?past:[]));
  const [showSaveConfirm, setShowSaveConfirm] = React.useState(false);
  React.useEffect(()=>{ const s=Array.isArray(past)?past.slice():[]; setRows(s); setSavedSnapshot(JSON.stringify(s)); },[JSON.stringify(past||[])]);
  // Track dirty state
  const isDirty = React.useMemo(()=> JSON.stringify(rows) !== savedSnapshot, [rows, savedSnapshot]);
  React.useEffect(()=>{ if(onDirtyChange) onDirtyChange(isDirty); },[isDirty]);

  // Compute human-readable changes summary
  function getChangesSummary() {
    const origRows = JSON.parse(savedSnapshot);
    const origMap = {}; origRows.forEach(r => { if(r.id) origMap[r.id] = r; });
    const curMap = {}; rows.forEach(r => { if(r.id) curMap[r.id] = r; });
    const changes = [];
    // Deleted rows
    origRows.forEach(r => { if(r.id && !curMap[r.id]) changes.push('Deleted: ' + (r.name || r.id)); });
    // Added rows
    rows.forEach(r => { if(r.id && !origMap[r.id]) changes.push('Added: ' + (r.name || r.id)); });
    // Modified rows
    const fields = ['tag','month_tag','date','name','amount','debit','type','category','subcategory','notes','vi','currency','year'];
    rows.forEach(r => {
      if(!r.id || !origMap[r.id]) return;
      const orig = origMap[r.id];
      const diffs = [];
      fields.forEach(f => {
        const ov = orig[f] == null ? '' : String(orig[f]);
        const nv = r[f] == null ? '' : String(r[f]);
        if(ov !== nv) diffs.push(f + ': "' + ov + '" → "' + nv + '"');
      });
      if(diffs.length) changes.push('Modified "' + (r.name||r.id) + '": ' + diffs.join(', '));
    });
    return changes;
  }

  const totalTx=rows.length; const catCount=Object.keys(categories||{}).length; 
  const activeMonths=(function(list){var s={}; list.forEach(r=>{var t=String(r.tag||r.month_tag||''); if(t&&t!=='0') s[t]=1;}); return Object.keys(s).length;})(rows);
  // Single filter: select column and enter value
  // Default: if there are tags, set filterCol to 'tag' and filterVal to latest tag/year
  const tags = React.useMemo(() => rows.map(r => String(r.tag||'')).filter(Boolean), [rows]);
  const defaultTagYear = React.useMemo(() => {
    // Find the most recent tag/year combo
    let bestYear = 0, bestTag = 0;
    (rows || []).forEach(r => {
      let y = Number(r.year || 0);
      let t = Number(r.month_tag || 0);
      // Parse from new tag format if present (e.g. "2/26")
      const tagStr = String(r.tag || '');
      const sl = tagStr.indexOf('/');
      if (sl >= 0) {
        t = Number(tagStr.substring(0, sl)) || 0;
        const yyStr = tagStr.substring(sl + 1);
        y = yyStr.length <= 2 ? (Number(yyStr) || 0) + 2000 : (Number(yyStr) || 0);
      }
      if (y > bestYear || (y === bestYear && t > bestTag)) { bestYear = y; bestTag = t; }
    });
    return bestTag && bestYear ? bestTag + '/' + String(bestYear).slice(-2) : '';
  }, [rows]);
  const [filterCol, setFilterCol] = React.useState(initialFilter ? initialFilter.col : (tags.length ? 'tag' : ''));
  const [filterVal, setFilterVal] = React.useState(initialFilter ? initialFilter.val : (defaultTagYear || ''));
  // Optional second filter (applies after the first)
  const [filter2Col, setFilter2Col] = React.useState(initialFilter ? (initialFilter.col2 || '') : '');
  const [filter2Val, setFilter2Val] = React.useState(initialFilter ? (initialFilter.val2 || '') : '');
  // Optional third filter (applies after the second)
  const [filter3Col, setFilter3Col] = React.useState(initialFilter ? (initialFilter.col3 || '') : '');
  const [filter3Val, setFilter3Val] = React.useState(initialFilter ? (initialFilter.val3 || '') : '');
  // Apply initialFilter when it changes (cross-tab navigation from summary)
  React.useEffect(() => {
    if (initialFilter && initialFilter.col && initialFilter.val) {
      setFilterCol(initialFilter.col);
      setFilterVal(initialFilter.val);
      setFilter2Col(initialFilter.col2 || '');
      setFilter2Val(initialFilter.val2 || '');
      setFilter3Col(initialFilter.col3 || '');
      setFilter3Val(initialFilter.val3 || '');
    }
  }, [initialFilter && initialFilter.col, initialFilter && initialFilter.val, initialFilter && initialFilter.col2, initialFilter && initialFilter.val2, initialFilter && initialFilter.col3, initialFilter && initialFilter.val3]);
  // If rows change and defaultTagYear changes, update filterCol/Val if filterCol is empty or tag
  React.useEffect(() => {
    if (initialFilter) return; // Don't override initial filter from summary
    if (defaultTagYear && (!filterCol || filterCol === 'tag') && (!filterVal || filterVal !== defaultTagYear)) {
      setFilterCol('tag');
      setFilterVal(defaultTagYear);
    }
  }, [defaultTagYear]);
  function patch(id,p){ const i=rows.findIndex(r=>r.id===id); if(i<0) return; const n=rows.slice(); n[i]=Object.assign({},n[i],p); setRows(n); }
  function delRow(id){ setRows(rows.filter(r=>r.id!==id)); }
  function toggleType(id){ const r=rows.find(x=>x.id===id); if(!r) return; patch(id,{type:r.type==='Expense'?'Income':'Expense'}); }
  // Toggle currency cycles through allowed currencies from settings
  const allowedCurrencies = (window.settings && window.settings.allowedCurrencies) || (typeof settings !== 'undefined' && settings.allowedCurrencies) || ["ILS","USD"];
  function toggleCurrency(id) {
    const r = rows.find(x => x.id === id); if (!r) return;
    const allowed = allowedCurrencies.length ? allowedCurrencies : ["ILS","USD"];
    const cur = r.currency || allowed[0];
    const idx = allowed.indexOf(cur);
    const next = allowed[(idx+1)%allowed.length];
    patch(id, { currency: next });
  }
  // inline edit buffers for Amount and Debit so typing isn't auto-formatted
  function onAmountEditChange(id, val){
    patch(id, { amount_edit: val });
  }
  function onAmountEditBlur(id){
    const r = rows.find(x => x.id === id); if (!r) return;
    const raw = (r.amount_edit != null ? r.amount_edit : r.amount);
    const n = parseAmount(raw);
    patch(id, { amount: Math.abs(n||0), amount_edit: undefined });
  }
  function onDebitEditChange(id, val){
    patch(id, { debit_edit: val });
  }
  function onDebitEditBlur(id){
    const r = rows.find(x => x.id === id); if (!r) return;
    const raw = (r.debit_edit != null ? r.debit_edit : r.debit);
    const n = parseAmount(raw);
    patch(id, { debit: Math.abs(n||0), debit_edit: undefined });
  }
  // Get unique values for dropdowns
  const categoryOptions = React.useMemo(() => {
    const fromData = Array.from(new Set(rows.map(r => r.category).filter(Boolean))).sort();
    const fromCategories = Object.keys(categories || {}).sort();
    return Array.from(new Set([...fromData, ...fromCategories]));
  }, [rows, categories]);
  
  const subcategoryOptions = React.useMemo(() => {
    const fromData = Array.from(new Set(rows.map(r => r.subcategory).filter(Boolean))).sort();
    const fromCategories = Object.values(categories || {}).flat().filter(Boolean);
    return Array.from(new Set([...fromData, ...fromCategories]));
  }, [rows, categories]);

  function save(){ 
    if(isDirty) { setShowSaveConfirm(true); return; }
  }
  function doSave() {
    setShowSaveConfirm(false);
    setSaving(true); API.savePast(rows).then(()=>{ setSaving(false); setSavedSnapshot(JSON.stringify(rows)); onSaved && onSaved(rows); alert('Past data updated.'); }).catch(e=>{ setSaving(false); alert('Save failed: '+e.message); }); 
  }
  function setSort(k){ if(sortKey===k) setSortDir(sortDir==='asc'?'desc':'asc'); else { setSortKey(k); setSortDir('asc'); } }
  function v(r,k){ 
    switch(k){ 
      case 'tag':{ const t=String(r.tag||''); const sl=t.indexOf('/'); if(sl>=0){const mm=Number(t.substring(0,sl)||0),yy=Number(t.substring(sl+1)||0); return (yy<100?yy+2000:yy)*100+mm;} return Number(r.year||0)*100+Number(r.month_tag||r.tag||0); }
      case 'date': { var ds=String(r.date||r.date_iso||'1900-01-01'); var dm=ds.match(/^(\d{2})-(\d{2})-(\d{4})$/); return dm ? new Date(dm[3]+'-'+dm[2]+'-'+dm[1]) : new Date(ds); }
      case 'name':return String(r.name||'').toLowerCase(); 
      case 'amount':return Number(r.amount||0); 
      case 'debit':return Number(r.debit||0); 
      case 'type':return String(r.type||''); 
      case 'category':return String(r.category||'').toLowerCase(); 
      case 'subcategory':return String(r.subcategory||'').toLowerCase(); 
      case 'notes':return String(r.notes||'').toLowerCase(); 
      case 'vi':return r.vi?1:0; 
      default:return ''; 
    } 
  }
  // Helper: get display tag for a row (e.g. "2/26")
  function getDisplayTag(r) {
    if (String(r.tag||'').includes('/')) return String(r.tag);
    return (r.month_tag||r.tag||'') + '/' + String(r.year||'').slice(-2);
  }
  const filtered = React.useMemo(() => {
    const x = (q || '').trim().toLowerCase();
    return (rows || []).filter(r => {
      // Enhanced text search (q) - includes numbers
      const displayTag = getDisplayTag(r);
      const matchText = !x || [
        r.date, r.name, r.notes, r.category, r.subcategory, displayTag,
        String(r.amount||0), String(r.debit||0)
      ].some(v => String(v == null ? '' : v).toLowerCase().includes(x));
      
      // Helper: match a single filter column
      function matchFilter(col, val, row) {
        if (!col || !val.trim()) return true;
        const v = String(val).toLowerCase().trim();
        switch (col) {
          case 'tag': {
            // Build display tag for matching (e.g. "2/26")
            const rowDisplayTag = String(row.tag||'').includes('/') ? String(row.tag) : ((row.month_tag||row.tag||'') + '/' + String(row.year||'').slice(-2));
            const slash = v.indexOf('/');
            if (slash >= 0) {
              const filterTag = v.substring(0, slash).trim();
              const filterYear = v.substring(slash + 1).trim();
              // Parse row display tag
              const rowSlash = rowDisplayTag.indexOf('/');
              const rowTagPart = rowSlash >= 0 ? rowDisplayTag.substring(0, rowSlash) : rowDisplayTag;
              const rowYearPart = rowSlash >= 0 ? rowDisplayTag.substring(rowSlash + 1) : '';
              const tagMatch = !filterTag || rowTagPart === filterTag;
              const yearMatch = !filterYear || rowYearPart === filterYear || String(row.year||'').endsWith(filterYear);
              return tagMatch && yearMatch;
            }
            // No slash: just match against display tag
            return rowDisplayTag.toLowerCase().includes(v);
          }
          case 'name': return String(row.name == null ? '' : row.name).toLowerCase().includes(v);
          case 'category': return String(row.category == null ? '' : row.category).toLowerCase().includes(v);
          case 'subcategory': return String(row.subcategory == null ? '' : row.subcategory).toLowerCase().includes(v);
          default: return true;
        }
      }
      const matchCol = matchFilter(filterCol, filterVal, r);
      const matchCol2 = matchFilter(filter2Col, filter2Val, r);
      const matchCol3 = matchFilter(filter3Col, filter3Val, r);
      return matchText && matchCol && matchCol2 && matchCol3;
    });
  }, [rows, q, filterCol, filterVal, filter2Col, filter2Val, filter3Col, filter3Val]);
  // No longer need tagOptions, catOptions, subOptions, nameOptions
  const view=React.useMemo(()=>{ 
    const a=filtered.slice(); 
    a.sort((x,y)=>{ 
      const vx=v(x,sortKey), vy=v(y,sortKey); 
      let c;
      if (sortKey === 'date') {
        // Special handling for date comparison
        c = (vx.getTime()||0) - (vy.getTime()||0);
      } else if (typeof vx==='number'&&typeof vy==='number') {
        c = vx - vy;
      } else {
        c = vx < vy ? -1 : vx > vy ? 1 : 0;
      }
      return sortDir==='asc'?c:-c; 
    }); 
    return a; 
  },[filtered,sortKey,sortDir]);
  function hdr(lbl,key,cls){ const ar=sortKey===key?(sortDir==='asc'?' ↑':' ↓'):' ↑↓'; return <th className={cls||''} onClick={()=>setSort(key)}>{lbl}{ar}</th>; }
  return (
    <React.Fragment>
      {/* Save confirmation modal showing all changes */}
      {showSaveConfirm && (
        <div className="modal-overlay" style={{alignItems:'flex-start',paddingTop:'5vh'}} onClick={()=>setShowSaveConfirm(false)}>
          <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxHeight:'80vh',overflow:'auto'}}>
            <h3>💾 Confirm Save Changes</h3>
            <p style={{margin:'4px 0 12px',fontSize:13,color:'#667085'}}>The following changes will be saved:</p>
            <div style={{maxHeight:'50vh',overflowY:'auto',background:'#f9fafb',borderRadius:10,padding:12,fontSize:13,lineHeight:'1.8'}}>
              {getChangesSummary().length ? getChangesSummary().map((c,i) => <div key={i} style={{borderBottom:'1px solid #e5e7eb',padding:'4px 0'}} dir="auto">{c}</div>) : <div className="muted">No changes detected.</div>}
            </div>
            <div className="modal-actions">
              <button className="btn" onClick={()=>setShowSaveConfirm(false)}>Cancel</button>
              <button className="btn primary" onClick={doSave}>✅ Save</button>
            </div>
          </div>
        </div>
      )}
      <div className="section-title">📊 Transaction Data</div>
      <div className="kpis">
        <div className="kpi k1">Total Transactions<span className="n">{(totalTx)}</span></div>
        <div className="kpi k3">Categories<span className="n">{(catCount)}</span></div>
        <div className="kpi k1">Active Months<span className="n">{(activeMonths)}</span></div>
      </div>
      <div className="panel" style={{marginBottom:12}}>
        <div className="toolbar" style={{gap: 18}}>
          <div className="left" style={{display:'flex',alignItems:'center',gap:8}}>
            <input className="input-xs" type="text" placeholder="Search by name, amount, notes…" value={q} onChange={(e)=>setQ(e.target.value)}/>
            <button className="btn btn-xs" onClick={()=>setQ('')}>Clear</button>
          </div>
          <div className="middle" style={{display:'flex',alignItems:'center',gap:32,flexWrap:'wrap',minHeight:'64px'}}>
            {/* Primary and Secondary filter labels and controls in a single horizontal row, aligned with search */}
            <div style={{display:'flex',flexDirection:'row',alignItems:'center',gap:32}}>
              {/* Primary */}
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',justifyContent:'center'}}>

                    <option value="">(optional)…</option>

                        <option value="">All {filter3Col}s</option>

                    <input className="input-xs" style={{minWidth:120,height:'40px'}} type="text" placeholder={filter3Col === 'tag' ? 'e.g. 2/26' : 'Third value'} value={filter3Val} onChange={e=>setFilter3Val(e.target.value)} disabled={!filter3Col || !filter2Col}/>

            {(filterCol||filterVal||filter2Col||filter2Val||filter3Col||filter3Val) && (
              <button
                className="btn btn-xs"
                style={{alignSelf:'center',marginLeft:8,marginBottom:0,height:'40px'}}
                onClick={() => {
                  setFilterCol(''); setFilterVal('');
                  setFilter2Col(''); setFilter2Val('');
                  setFilter3Col(''); setFilter3Val('');
                }}>
                Reset
              </button>
            )}
          </div>
            <div className="right">
              <button className="btn btn-xs primary" onClick={save} disabled={saving}>{saving?'Saving…':'💾 Save Changes'}</button>
            </div>
